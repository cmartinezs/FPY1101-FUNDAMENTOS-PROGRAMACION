<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lector · FPY-1101</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #101828;
      --paper: #f8fafc;
      --line: #d8e0ea;
      --blue: #2563eb;
      --dark: #111827;
      --muted: #667085;
      --mono: "Space Mono", monospace;
      --sans: "DM Sans", sans-serif;
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
    }

    .reader-nav {
      background: rgba(248, 250, 252, .9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), #0f766e);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 700;
    }

    .reader-shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 1rem 5rem;
    }

    .reader-meta {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .78rem;
      margin-bottom: 1rem;
      overflow-wrap: anywhere;
    }

    .markdown-body {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: clamp(1.25rem, 4vw, 3rem);
      box-shadow: 0 18px 48px rgba(16, 24, 40, .08);
      line-height: 1.72;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      font-weight: 800;
      letter-spacing: 0;
    }

    .markdown-body h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .markdown-body h2 {
      border-top: 1px solid var(--line);
      padding-top: 1.6rem;
      margin-top: 2rem;
      font-size: 1.55rem;
    }

    .markdown-body h3 {
      margin-top: 1.5rem;
      font-size: 1.18rem;
    }

    .markdown-body a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    .markdown-body a:hover { text-decoration: underline; }

    .markdown-body pre {
      border: 1px solid #d0d7e2;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      overflow-x: auto;
    }

    .markdown-body code {
      border-radius: 5px;
      background: #eef2f7;
      color: #0f172a;
      padding: .12rem .34rem;
      font-family: var(--mono);
      font-size: .9em;
    }

    .markdown-body pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--blue);
      background: #f1f5f9;
      padding: .8rem 1rem;
      color: #475467;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid var(--line);
      padding: .65rem .75rem;
      vertical-align: top;
    }

    .markdown-body th { background: #f1f5f9; }

    .error-box {
      border: 1px solid #fecaca;
      border-radius: 8px;
      background: #fff1f2;
      color: #991b1b;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <nav class="navbar reader-nav sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="index.html">
        <span class="brand-mark">Py</span>
        <span>FPY-1101</span>
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-sm btn-outline-secondary" href="index.html#material"><i class="bi bi-grid me-1"></i>Material</a>
        <a class="btn btn-sm btn-dark" href="index.html"><i class="bi bi-house-door me-1"></i>Inicio</a>
      </div>
    </div>
  </nav>

  <main class="reader-shell">
    <div id="sourcePath" class="reader-meta"></div>
    <article id="content" class="markdown-body">
      <p>Cargando material...</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    const content = document.getElementById("content");
    const sourcePath = document.getElementById("sourcePath");
    const params = new URLSearchParams(window.location.search);
    const src = params.get("src") || "lessons/README.md";

    function showError(message) {
      content.className = "error-box";
      content.innerHTML = `<strong>No se pudo cargar el material.</strong><br>${message}`;
    }

    function normalizePath(path) {
      const parts = [];
      for (const part of path.split("/")) {
        if (!part || part === ".") continue;
        if (part === "..") parts.pop();
        else parts.push(part);
      }
      return parts.join("/");
    }

    function isAllowedMarkdown(path) {
      return /^(lessons|extras)\//.test(path) && path.endsWith(".md") && !path.includes("..");
    }

    function rewriteMarkdownLinks(basePath) {
      const baseDir = basePath.split("/").slice(0, -1).join("/");

      content.querySelectorAll("a[href]").forEach((link) => {
        const href = link.getAttribute("href");
        if (!href || href.startsWith("#") || /^[a-z]+:/i.test(href)) return;

        const [filePart, hashPart] = href.split("#");
        if (!filePart.endsWith(".md")) return;

        const resolved = normalizePath(`${baseDir}/${filePart}`);
        if (!isAllowedMarkdown(resolved)) return;

        const next = `reader.html?src=${encodeURIComponent(resolved)}${hashPart ? `#${hashPart}` : ""}`;
        link.setAttribute("href", next);
      });
    }

    async function loadMarkdown() {
      const safeSrc = normalizePath(src);
      if (!isAllowedMarkdown(safeSrc)) {
        showError("La ruta solicitada no pertenece a lessons/ o extras/.");
        return;
      }

      sourcePath.textContent = safeSrc;

      try {
        const response = await fetch(safeSrc);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const markdown = await response.text();
        content.innerHTML = marked.parse(markdown);
        rewriteMarkdownLinks(safeSrc);
      } catch (error) {
        showError(`Revisa que exista el archivo: ${safeSrc}`);
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
